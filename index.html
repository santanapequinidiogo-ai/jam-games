<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Own the Road - GGJ Safe Driving Sim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" class="hidden"></canvas>
        <div id="three-container"></div>
        
        <div id="ui-overlay">
            <div class="hud">
                <div class="stat-box">
                    <div class="stat-group">
                        <span class="label">VELOCIDADE</span>
                        <span id="speed" class="value">0 km/h</span>
                    </div>
                    <div class="stat-group">
                        <span class="label">PONTUAÇÃO SEGURA</span>
                        <span id="safe-score" class="value">0</span>
                    </div>
                </div>
                <div class="status-bars">
                    <div class="stat-item">CLIMA: <span id="weather">Ensolarado</span></div>
                    <div class="stat-item">SINAL: <span id="light-status">Verde</span></div>
                </div>
            </div>

            <div id="safety-tip-overlay" class="hidden">
                <div class="tip-content">
                    <h2 id="tip-title">INFRAÇÃO DETECTADA!</h2>
                    <p id="tip-text"></p>
                    <button id="resume-btn">REINICIAR MOTOR</button>
                </div>
            </div>

            <div id="start-screen">
                <div class="intro">
                    <h1>OWN THE ROAD 3D</h1>
                    <p>Global Game Jam - Safe Driving Simulator</p>
                    <div class="controls-guide">
                        <div class="control-key">↑ ACELERAR</div>
                        <div class="control-key">↓ FREAR</div>
                        <div class="control-key">← → DIREÇÃO</div>
                    </div>
                    <button id="start-btn">INICIAR SIMULADOR 3D</button>
                </div>
            </div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
